spring.application.name=mvsrconnect

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

server.forward-headers-strategy=framework
server.servlet.session.cookie.same-site=None
server.servlet.session.cookie.secure=true

server.address=0.0.0.0
server.port=${PORT:8080}

management.endpoints.web.exposure.include=health
./
moderation.url=${MODERATION_URL:http://localhost:5001}
moderation.enabled=${MODERATION_ENABLED:true}

# JavaMail (Gmail SMTP ? set MAIL_USERNAME and MAIL_PASSWORD env vars)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# VAPID Keys for Web Push
vapid.public.key=${VAPID_PUBLIC_KEY}
vapid.private.key=${VAPID_PRIVATE_KEY}
vapid.subject=${VAPID_SUBJECT}

# Razorpay (set via env vars in production)
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET:}


canteen.payment.mode=${CANTEEN_PAYMENT_MODE:AUTO}
canteen.vendor.session.hours=12
app.base-url=${APP_BASE_URL:}
canteen.qr.secret=${CANTEEN_QR_SECRET:}