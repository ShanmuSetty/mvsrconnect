<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vendor Login — MVSR Connect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f4f0; --bg2: #eeecea; --surface: #ffffff;
      --border: #e0deda; --border2: #c8c4be;
      --ink: #1a1916; --ink2: #6b6760; --ink3: #a09c97;
      --red: #c0392b; --radius: 10px;
      --sans: 'Geist', sans-serif; --serif: 'Instrument Serif', serif;
    }
    [data-theme="dark"] {
      --bg: #111110; --bg2: #1a1917; --surface: #1f1e1c;
      --border: #2a2825; --border2: #3d3a35;
      --ink: #e8e6e1; --ink2: #9a9690; --ink3: #605c57;
      --red: #e05c4b;
    }
    html, body {
      min-height: 100vh; font-family: var(--sans);
      background: var(--bg); color: var(--ink);
      -webkit-font-smoothing: antialiased; transition: background 0.2s, color 0.2s;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }
    .page {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px; position: relative; z-index: 1;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 36px 32px; width: 100%; max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.06);
    }
    .logo {
      display: flex; align-items: center; gap: 7px;
      font-family: var(--serif); font-size: 1.1rem; color: var(--ink);
      text-decoration: none; margin-bottom: 28px;
    }
    .logo-dot { width: 7px; height: 7px; background: var(--ink); border-radius: 50%; }
    .card-title { font-family: var(--serif); font-size: 1.5rem; color: var(--ink); margin-bottom: 6px; }
    .card-sub { font-size: 0.83rem; color: var(--ink3); margin-bottom: 24px; line-height: 1.6; }
    .error-msg {
      background: rgba(192,57,43,0.08); color: var(--red);
      border: 1px solid rgba(192,57,43,0.2);
      border-radius: 8px; padding: 10px 14px;
      font-size: 0.82rem; margin-bottom: 16px; display: none;
    }
    .error-msg.show { display: block; }
    label {
      display: block; font-size: 0.72rem; font-weight: 600;
      color: var(--ink3); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.3px;
    }
    input[type=text] {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--ink); border-radius: 8px; padding: 10px 14px;
      font-size: 0.9rem; font-family: var(--sans); outline: none;
      transition: border-color 0.15s, background 0.15s; margin-bottom: 16px;
    }
    input[type=text]:focus { border-color: var(--ink); background: var(--surface); }
    input[type=text]::placeholder { color: var(--ink3); }
    .login-btn {
      width: 100%; padding: 11px; background: var(--ink); color: var(--bg);
      border: none; border-radius: 99px; font-size: 0.85rem; font-weight: 500;
      font-family: var(--sans); cursor: pointer; transition: opacity 0.15s;
    }
    .login-btn:hover { opacity: 0.85; }
    .login-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    [data-theme="dark"] .login-btn { background: #e8e6e1; color: #1a1916; }
    .back-link {
      display: block; text-align: center; margin-top: 16px;
      font-size: 0.78rem; color: var(--ink3); text-decoration: none; transition: color 0.15s;
    }
    .back-link:hover { color: var(--ink); }
    .theme-toggle {
      position: fixed; top: 16px; right: 16px; z-index: 10;
      width: 34px; height: 34px; border-radius: 99px;
      background: var(--surface); border: 1px solid var(--border2);
      color: var(--ink2); cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 0.95rem; transition: all 0.15s;
    }
    .theme-toggle:hover { background: var(--bg2); color: var(--ink); }
  </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">☀</button>

<div class="page">
  <div class="card">
    <a href="/" class="logo"><span class="logo-dot"></span>MVSR Connect</a>
    <h1 class="card-title">Vendor Login</h1>
    <p class="card-sub">Enter the setup token provided by the MvsrConnect admin to access your dashboard.</p>
    <div class="error-msg" id="errMsg">Invalid or expired token. Please contact the admin.</div>
    <label for="token">Setup Token</label>
    <input type="text" id="token" placeholder="Paste your token here"/>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Login to Dashboard</button>
    <a href="/" class="back-link">← Back to MVSR Connect</a>
  </div>
</div>

<script>
  (function() {
    const saved = localStorage.getItem('mvsr-theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
  })();
  function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const next = isDark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('mvsr-theme', next);
    document.querySelector('.theme-toggle').textContent = next === 'dark' ? '☽' : '☀';
  }
  window.addEventListener('load', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.querySelector('.theme-toggle').textContent = isDark ? '☽' : '☀';
  });

  const params = new URLSearchParams(location.search);
  if (params.get('token')) document.getElementById('token').value = params.get('token');
  if (params.get('error')) document.getElementById('errMsg').classList.add('show');

  function doLogin() {
  const token = document.getElementById('token').value.trim();
  if (!token) return;
  window.location.href = `/canteen/vendor/login?token=${encodeURIComponent(token)}`;
}
  document.getElementById('token').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
