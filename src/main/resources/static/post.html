<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post · MVSR Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --bg:       #f5f4f0;
          --bg2:      #eeecea;
          --surface:  #ffffff;
          --border:   #e0deda;
          --border2:  #c8c4be;
          --ink:      #1a1916;
          --ink2:     #6b6760;
          --ink3:     #a09c97;
          --accent:   #1a1916;
          --red:      #c0392b;
          --green:    #2d6a4f;
          --radius:   10px;
          --sans:     'Geist', sans-serif;
          --serif:    'Instrument Serif', serif;
          --topbar-bg: rgba(245,244,240,0.88);
        }

        [data-theme="dark"] {
          --bg:       #111110;
          --bg2:      #1a1917;
          --surface:  #1f1e1c;
          --border:   #2a2825;
          --border2:  #3d3a35;
          --ink:      #e8e6e1;
          --ink2:     #9a9690;
          --ink3:     #605c57;
          --accent:   #e8e6e1;
          --red:      #e05c4b;
          --green:    #4ade80;
          --topbar-bg: rgba(17,17,16,0.88);
        }

        html { scroll-behavior: smooth; }
        body {
          background: var(--bg); color: var(--ink);
          font-family: var(--sans); font-size: 15px; line-height: 1.6;
          min-height: 100vh; -webkit-font-smoothing: antialiased;
          transition: background 0.2s ease, color 0.2s ease;
        }
        body::before {
          content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
          opacity: 0.035;
          background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
          background-size: 180px 180px;
        }

        /* TOP PROGRESS */
        #top-progress {
          position: fixed; top: 0; left: 0; z-index: 9999;
          height: 2px; width: 0%; background: var(--ink);
          transition: width 0.2s ease, opacity 0.3s ease; opacity: 0; pointer-events: none;
        }
        #top-progress.active { opacity: 1; }
        [data-theme="dark"] #top-progress { background: #e8e6e1; }

        /* TOPBAR */
        .topbar {
          position: sticky; top: 0; z-index: 200; height: 56px;
          background: var(--topbar-bg); backdrop-filter: blur(16px);
          border-bottom: 1px solid var(--border);
          display: flex; align-items: center; justify-content: space-between;
          padding: 0 32px; gap: 12px;
        }
        .logo {
          font-family: var(--serif); font-size: 1.2rem; letter-spacing: -0.2px;
          color: var(--ink); display: flex; align-items: center; gap: 7px;
          flex-shrink: 0; text-decoration: none;
        }
        .logo-dot { width: 8px; height: 8px; background: var(--ink); border-radius: 50%; display: inline-block; }
        .topbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .theme-toggle {
          width: 34px; height: 34px; border-radius: 99px;
          background: transparent; border: 1px solid var(--border2);
          color: var(--ink2); cursor: pointer;
          display: flex; align-items: center; justify-content: center;
          font-size: 0.95rem; transition: all 0.15s ease;
        }
        .theme-toggle:hover { background: var(--bg2); color: var(--ink); }
        .btn {
          font-family: var(--sans); font-size: 0.8rem; font-weight: 500;
          padding: 7px 18px; border-radius: 99px; cursor: pointer;
          border: none; transition: all 0.15s ease; white-space: nowrap;
        }
        .btn-dark { background: #1a1916; color: #fff; }
        .btn-dark:hover { background: #333; }
        [data-theme="dark"] .btn-dark { background: #e8e6e1; color: #1a1916; }
        [data-theme="dark"] .btn-dark:hover { background: #fff; }
        .btn-ghost { background: transparent; color: var(--ink2); border: 1px solid var(--border2); }
        .btn-ghost:hover { background: var(--bg2); color: var(--ink); }
        .btn-sm { padding: 5px 13px; font-size: 0.75rem; }

        /* NOTIFICATION BELL */
        .notif-bell-wrap { position: relative; }
        .notif-bell {
          width: 34px; height: 34px; border-radius: 99px;
          background: transparent; border: 1px solid var(--border2);
          color: var(--ink2); cursor: pointer;
          display: flex; align-items: center; justify-content: center;
          font-size: 1rem; transition: all 0.15s; position: relative;
        }
        .notif-bell:hover { background: var(--bg2); color: var(--ink); }
        .notif-badge {
          position: absolute; top: -4px; right: -4px;
          background: var(--red); color: #fff; font-size: 0.6rem; font-weight: 700;
          width: 16px; height: 16px; border-radius: 50%;
          display: flex; align-items: center; justify-content: center;
          border: 2px solid var(--bg); pointer-events: none;
        }
        .notif-dropdown {
          position: absolute; top: calc(100% + 10px); right: 0;
          width: 320px; background: var(--surface); border: 1px solid var(--border);
          border-radius: var(--radius); box-shadow: 0 8px 32px rgba(0,0,0,0.12);
          z-index: 300; overflow: hidden; animation: dropDown 0.18s ease;
        }
        @media (max-width: 860px) {
          .notif-dropdown {
            position: fixed; top: auto; bottom: 0; left: 0; right: 0;
            width: 100%; border-radius: var(--radius) var(--radius) 0 0;
            max-height: 80vh; overflow-y: auto;
            animation: slideUpSheet 0.22s ease;
          }
        }
        .notif-header {
          display: flex; align-items: center; justify-content: space-between;
          padding: 12px 16px 10px; border-bottom: 1px solid var(--border);
          position: sticky; top: 0; background: var(--surface); z-index: 1;
        }
        .notif-header-title { font-family: var(--serif); font-size: 0.95rem; color: var(--ink); }
        .notif-header-actions { display: flex; gap: 10px; align-items: center; }
        .notif-mark-read {
          font-size: 0.7rem; color: var(--ink3); background: none; border: none;
          cursor: pointer; font-family: var(--sans); padding: 0; transition: color 0.15s;
        }
        .notif-mark-read:hover { color: var(--ink); }
        .notif-close-btn {
          font-size: 0.8rem; color: var(--ink3); background: none; border: none; cursor: pointer;
          font-family: var(--sans); padding: 2px 6px; border-radius: 99px; transition: all 0.15s;
          display: none;
        }
        @media (max-width: 860px) { .notif-close-btn { display: block; } }
        .notif-close-btn:hover { background: var(--bg2); color: var(--ink); }
        .notif-list { max-height: 360px; overflow-y: auto; }
        @media (max-width: 860px) { .notif-list { max-height: none; } }
        .notif-item {
          display: block; padding: 12px 16px; border-bottom: 1px solid var(--border);
          text-decoration: none; transition: background 0.12s; cursor: pointer;
        }
        .notif-item:last-child { border-bottom: none; }
        .notif-item:hover { background: var(--bg2); }
        .notif-item.unread { background: rgba(26,25,22,0.03); }
        [data-theme="dark"] .notif-item.unread { background: rgba(232,230,225,0.04); }
        .notif-item-title { font-size: 0.82rem; font-weight: 600; color: var(--ink); margin-bottom: 2px; }
        .notif-item-body { font-size: 0.78rem; color: var(--ink2); line-height: 1.4; }
        .notif-item-time { font-size: 0.68rem; color: var(--ink3); margin-top: 4px; }
        .notif-empty { padding: 32px 16px; text-align: center; color: var(--ink3); font-size: 0.82rem; }
        .notif-overlay {
          display: none; position: fixed; inset: 0; z-index: 299;
          background: rgba(0,0,0,0.4); animation: fadeIn 0.18s ease;
        }
        .notif-overlay.visible { display: block; }
        .notif-push-banner {
          padding: 10px 16px; background: var(--bg2); border-bottom: 1px solid var(--border);
          font-size: 0.75rem; color: var(--ink2);
          display: flex; align-items: center; justify-content: space-between; gap: 8px;
        }
        .notif-push-enable {
          font-size: 0.72rem; font-weight: 600; padding: 4px 10px; border-radius: 99px;
          border: 1px solid var(--border2); background: var(--surface); color: var(--ink);
          cursor: pointer; font-family: var(--sans); white-space: nowrap; transition: all 0.15s;
        }
        .notif-push-enable:hover { background: var(--ink); color: var(--bg); }

        /* USER CHIP */
        .user-chip {
          display: flex; align-items: center; gap: 7px;
          background: var(--surface); border: 1px solid var(--border);
          border-radius: 99px; padding: 4px 12px 4px 5px;
          font-size: 0.8rem; font-weight: 500;
        }
        .user-chip img { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; }
        .user-chip .email { color: var(--ink3); font-size: 0.7rem; }

        /* HAMBURGER */
        .topbar-hamburger {
          display: none; width: 34px; height: 34px; border-radius: 99px;
          background: transparent; border: 1px solid var(--border2);
          color: var(--ink2); cursor: pointer;
          align-items: center; justify-content: center;
          font-size: 1rem; transition: all 0.15s; flex-shrink: 0;
        }
        .topbar-hamburger:hover { background: var(--bg2); color: var(--ink); }

        /* DRAWER */
        .topbar-drawer {
          display: none; position: fixed; top: 56px; left: 0; right: 0; z-index: 190;
          background: var(--bg); border-bottom: 1px solid var(--border);
          padding: 12px 16px 16px; flex-direction: column; gap: 6px;
          animation: fadeUp 0.18s ease; box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        .topbar-drawer.open { display: flex; }
        .topbar-drawer .drawer-user {
          display: flex; align-items: center; gap: 10px;
          padding: 4px 4px 12px; border-bottom: 1px solid var(--border); margin-bottom: 4px;
        }
        .topbar-drawer .drawer-user img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .topbar-drawer .drawer-user-name { font-size: 0.875rem; font-weight: 500; color: var(--ink); }
        .topbar-drawer .drawer-user-email { font-size: 0.7rem; color: var(--ink3); }
        .topbar-drawer .drawer-btn {
          width: 100%; text-align: left; border-radius: 8px; padding: 10px 14px;
          font-family: var(--sans); font-size: 0.875rem; font-weight: 500; cursor: pointer;
          border: none; background: transparent; color: var(--ink2); transition: all 0.12s;
        }
        .topbar-drawer .drawer-btn:hover { background: var(--bg2); color: var(--ink); }
        .topbar-drawer .drawer-btn.danger { color: var(--red); }
        .topbar-drawer .drawer-btn.danger:hover { background: rgba(192,57,43,0.07); }
        .drawer-notif-row {
          display: flex; align-items: center; justify-content: space-between;
          padding: 10px 14px; border-radius: 8px; border: none; background: transparent;
          cursor: pointer; transition: background 0.12s;
        }
        .drawer-notif-row:hover { background: var(--bg2); }
        .drawer-notif-label { font-size: 0.875rem; font-weight: 500; color: var(--ink2); font-family: var(--sans); display: flex; align-items: center; gap: 8px; }
        .drawer-notif-badge {
          background: var(--red); color: #fff; font-size: 0.6rem; font-weight: 700;
          padding: 1px 6px; border-radius: 99px; min-width: 18px; text-align: center;
        }

        /* PAGE LAYOUT */
        .page-wrap {
          max-width: 720px; margin: 0 auto; padding: 32px 24px 80px;
          position: relative; z-index: 1;
        }

        .back-link {
          display: inline-flex; align-items: center; gap: 5px;
          font-size: 0.78rem; color: var(--ink3); text-decoration: none;
          margin-bottom: 24px; transition: color 0.12s;
          background: none; border: none; cursor: pointer; font-family: var(--sans);
          padding: 0;
        }
        .back-link:hover { color: var(--ink); }

        /* POST DETAIL CARD */
        .post-detail {
          background: var(--surface); border: 1px solid var(--border);
          border-radius: var(--radius); overflow: hidden; margin-bottom: 12px;
          animation: fadeUp 0.3s ease both;
        }
        .post-detail-body { padding: 24px 28px; }
        .post-club-tag {
          display: inline-block; font-size: 0.67rem; font-weight: 600;
          letter-spacing: 0.8px; text-transform: uppercase; color: var(--ink3); margin-bottom: 10px;
        }
        .post-detail-title {
          font-family: var(--serif); font-size: 1.55rem; line-height: 1.25;
          color: var(--ink); margin-bottom: 10px; letter-spacing: -0.4px;
        }
        .post-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
        .post-tag {
          font-size: 0.67rem; font-weight: 500; color: var(--ink2);
          background: var(--bg2); border: 1px solid var(--border);
          border-radius: 99px; padding: 2px 8px;
        }
        .post-detail-content {
          font-size: 0.9rem; color: var(--ink2); line-height: 1.75;
          margin-bottom: 18px; white-space: pre-wrap;
        }
        .post-detail-media { margin: 4px 0 18px; }
        .post-detail-media img { max-width: 100%; border-radius: 8px; display: block; }
        .post-detail-media video { max-width: 100%; border-radius: 8px; display: block; }
        .post-meta {
          display: flex; align-items: center; gap: 6px;
          font-size: 0.72rem; color: var(--ink3); margin-bottom: 16px; flex-wrap: wrap;
        }
        .post-author { color: var(--ink2); font-weight: 500; }
        .meta-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--ink3); display: inline-block; }
        .post-actions { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
        .action-btn {
          display: inline-flex; align-items: center; gap: 4px;
          background: transparent; border: 1px solid var(--border);
          color: var(--ink2); border-radius: 99px; padding: 5px 12px;
          font-size: 0.75rem; font-family: var(--sans); font-weight: 500;
          cursor: pointer; transition: all 0.12s ease;
        }
        .action-btn:hover { border-color: var(--border2); color: var(--ink); background: var(--bg); }
        .action-btn.active { background: #1a1916; color: #fff; border-color: #1a1916; }
        [data-theme="dark"] .action-btn.active { background: #e8e6e1; color: #1a1916; border-color: #e8e6e1; }
        .action-btn.danger { color: var(--red); border-color: var(--border2); }
        .action-btn.danger:hover { background: var(--bg2); }
        .vote-column { display: flex; gap: 3px; }
        .vote-column button { background: none; border: none; cursor: pointer; }

        /* COMMENTS SECTION */
        .comments-wrap {
          background: var(--surface); border: 1px solid var(--border);
          border-radius: var(--radius); overflow: hidden;
          animation: fadeUp 0.3s 0.08s ease both;
        }
        .comments-header {
          padding: 16px 24px 14px; border-bottom: 1px solid var(--border);
          font-size: 0.72rem; font-weight: 600; letter-spacing: 1px;
          text-transform: uppercase; color: var(--ink3);
        }
        .comment-input-area { padding: 16px 24px; border-bottom: 1px solid var(--border); }
        .comment-input-row { display: flex; gap: 7px; }
        .comment-input-row input {
          flex: 1; background: var(--bg); border: 1px solid var(--border);
          border-radius: 99px; color: var(--ink); padding: 9px 16px;
          font-family: var(--sans); font-size: 0.85rem; outline: none; transition: border-color 0.15s;
        }
        .comment-input-row input:focus { border-color: var(--ink); background: var(--surface); }
        .comment-input-row input::placeholder { color: var(--ink3); }

        .comments-list { padding: 4px 0; }
        .comment {
          padding: 14px 24px; border-bottom: 1px solid var(--border);
          animation: fadeUp 0.2s ease;
        }
        .comment:last-child { border-bottom: none; }
        .comment.reply { padding-left: 44px; background: var(--bg); }
        .comment-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        .comment-user { font-size: 0.77rem; font-weight: 600; color: var(--ink); }
        .comment-time { font-size: 0.68rem; color: var(--ink3); }
        .comment-text { font-size: 0.875rem; color: var(--ink2); line-height: 1.55; }
        .comment-actions { display: flex; gap: 12px; margin-top: 6px; }
        .c-btn {
          background: none; border: none; color: var(--ink3); cursor: pointer;
          font-size: 0.7rem; font-family: var(--sans); font-weight: 500; padding: 0; transition: color 0.12s;
        }
        .c-btn:hover { color: var(--ink); }
        .c-btn.del:hover { color: var(--red); }
        .reply-box { margin-top: 10px; }
        .reply-box input {
          width: 100%; background: var(--bg); border: 1px solid var(--border);
          border-radius: 99px; color: var(--ink); padding: 7px 14px;
          font-family: var(--sans); font-size: 0.82rem; outline: none; transition: border-color 0.15s;
          margin-bottom: 6px;
        }
        .reply-box input:focus { border-color: var(--ink); }
        .no-comments { text-align: center; color: var(--ink3); font-size: 0.82rem; padding: 32px 24px; }

        /* LOADING / ERROR STATES */
        .loading { text-align: center; padding: 60px 24px; color: var(--ink3); font-size: 0.85rem; }
        .spinner {
          display: inline-block; width: 16px; height: 16px;
          border: 1.5px solid var(--border2); border-top-color: var(--ink);
          border-radius: 50%; animation: spin 0.6s linear infinite;
          margin-right: 7px; vertical-align: middle;
        }
        .error-state {
          text-align: center; padding: 80px 24px; color: var(--ink3);
        }
        .error-state h2 { font-family: var(--serif); font-size: 1.4rem; color: var(--ink2); margin-bottom: 8px; }
        .error-state p { font-size: 0.85rem; margin-bottom: 20px; }

        /* TOAST */
        .toast {
          position: fixed; bottom: 24px; right: 24px; background: var(--ink); color: #fff;
          border-radius: 99px; padding: 10px 18px; font-size: 0.82rem; font-weight: 500;
          z-index: 999; animation: slideUp 0.22s ease; max-width: 280px;
        }
        .toast.error { background: var(--red); }

        /* ANIMATIONS */
        @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes dropDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUpSheet { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes spin { to { transform: rotate(360deg); } }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

        @media (max-width: 860px) {
          .topbar { padding: 0 16px; }
          .topbar-right > *:not(.theme-toggle):not(.topbar-hamburger) { display: none !important; }
          .topbar-hamburger { display: flex; }
          .page-wrap { padding: 20px 16px 60px; }
          .post-detail-body { padding: 18px 18px; }
          .post-detail-title { font-size: 1.25rem; }
          .comment { padding: 12px 16px; }
          .comment.reply { padding-left: 32px; }
          .comment-input-area { padding: 14px 16px; }
          .comments-header { padding: 14px 16px 12px; }
        }
    </style>
</head>
<body>

<div id="top-progress"></div>
<div class="notif-overlay" id="notif-overlay" onclick="closeNotifDropdown()"></div>

<nav class="topbar">
    <a class="logo" href="/">
        <span class="logo-dot"></span>
        MVSR Connect
    </a>
    <div class="topbar-right" id="topbar-right">
        <div class="notif-bell-wrap" id="notif-bell-wrap">
            <button class="notif-bell" id="notif-bell" onclick="toggleNotifDropdown()" title="Notifications">🔔</button>
        </div>
        <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">☀</button>
        <button class="topbar-hamburger" id="topbar-hamburger" onclick="toggleTopbarDrawer()">☰</button>
        <button class="btn btn-dark" onclick="window.location.href='/oauth2/authorization/google'">Sign in</button>
    </div>
</nav>

<div class="topbar-drawer" id="topbar-drawer"></div>

<div class="page-wrap">
    <div id="page-content">
        <div class="loading"><span class="spinner"></span>Loading post…</div>
    </div>
</div>

<script>
    /* ── THEME ── */
    (function() {
      const saved = localStorage.getItem('mvsr-theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
    })();

    function toggleTheme() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const next = isDark ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('mvsr-theme', next);
      updateToggleIcon();
    }
    function updateToggleIcon() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.querySelectorAll('.theme-toggle').forEach(btn => {
        btn.textContent = isDark ? '☽' : '☀';
        btn.title = isDark ? 'Switch to light mode' : 'Switch to dark mode';
      });
    }

    /* ── PROGRESS ── */
    function topProgress(pct) {
      const el = document.getElementById('top-progress');
      if (!el) return;
      el.style.width = pct + '%';
      el.classList.add('active');
      if (pct >= 100) setTimeout(() => { el.classList.remove('active'); el.style.width = '0%'; }, 400);
    }

    /* ── UTILS ── */
    function escHtml(s) {
      if (!s) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function formatTime(raw) {
      if (!raw) return '';
      const d = new Date(raw);
      const now = new Date();
      const diff = Math.floor((now - d) / 1000);
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff/60) + 'm ago';
      if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
      if (diff < 604800) return Math.floor(diff/86400) + 'd ago';
      return d.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
    }
    function showToast(msg, type = 'success') {
      document.querySelectorAll('.toast').forEach(t => t.remove());
      const t = document.createElement('div');
      t.className = 'toast' + (type === 'error' ? ' error' : '');
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    /* ── AUTH & STATE ── */
    let currentUser = null;
    const postId = new URLSearchParams(window.location.search).get('id');

    window.addEventListener('load', () => { updateToggleIcon(); init(); });

    async function init() {
      if (!postId) { showError('No post specified', 'The URL is missing a post ID.'); return; }
      topProgress(20);
      try {
        const res = await fetch('/user', { credentials: 'include' });
        if (res.ok) {
          const data = await res.json();
          if (data?.email) { currentUser = data; buildTopbar(); }
        }
      } catch {}
      topProgress(60);
      await loadPost();
      topProgress(100);
      initNotifications();
    }

    function buildTopbar() {
      const pic = currentUser?.picture || '';
      const email = currentUser?.email || '';
      const name = currentUser?.name || email;
      const isAdmin = currentUser?.role === 'ADMIN';
      document.getElementById('topbar-right').innerHTML = `
        ${isAdmin ? `<button class="btn btn-ghost btn-sm" onclick="window.location.href='/admin.html'">Admin</button>` : ''}
        <button class="btn btn-ghost btn-sm" onclick="window.location.href='/'">← Feed</button>
        <div class="notif-bell-wrap" id="notif-bell-wrap">
          <button class="notif-bell" id="notif-bell" onclick="toggleNotifDropdown()" title="Notifications">🔔</button>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-toggle">☀</button>
        <div class="user-chip">
          ${pic ? `<img src="${escHtml(pic)}" alt="">` : ''}
          <div>
            <div>${escHtml(name.split(' ').slice(-2).join(' '))}</div>
            <div class="email">${escHtml(email)}</div>
          </div>
        </div>
        <button class="topbar-hamburger" id="topbar-hamburger" onclick="toggleTopbarDrawer()">☰</button>`;

      document.getElementById('topbar-drawer').innerHTML = `
        <div class="drawer-user">
          ${pic ? `<img src="${escHtml(pic)}" alt="">` : ''}
          <div>
            <div class="drawer-user-name">${escHtml(name)}</div>
            <div class="drawer-user-email">${escHtml(email)}</div>
          </div>
        </div>
        <div class="drawer-notif-row" onclick="openNotifDropdown()">
          <span class="drawer-notif-label">🔔 Notifications
            <span class="drawer-notif-badge" id="drawer-notif-badge" style="display:none">0</span>
          </span>
        </div>
        ${isAdmin ? `<button class="drawer-btn" onclick="window.location.href='/admin.html'">Admin Panel</button>` : ''}
        <button class="drawer-btn" onclick="window.location.href='/'">← Back to Feed</button>
        <button class="drawer-btn" onclick="window.location.href='/dashboard.html'">Dashboard</button>
        <button class="drawer-btn" onclick="window.location.href='/lostandfound.html'">Lost & Found</button>
        <button class="drawer-btn" onclick="window.location.href='/events.html'">Events</button>
        <button class="drawer-btn danger" onclick="logout()">Sign out</button>`;
      updateToggleIcon();
    }

    async function logout() { await fetch('/logout', { method: 'POST' }); window.location.href = '/'; }

    /* ── LOAD POST ── */
    async function loadPost() {
      try {
        const res = await fetch(`/posts/${postId}`);
        if (res.status === 404) { showError('Post not found', 'This post may have been deleted.'); return; }
        if (!res.ok) throw new Error();
        const post = await res.json();
        document.title = `${post.title || 'Post'} · MVSR Connect`;
        renderPostPage(post);
        loadVotes(postId);
        loadComments(postId);
      } catch {
        showError('Could not load post', 'Please check your connection and try again.');
      }
    }

    function showError(title, desc) {
      document.getElementById('page-content').innerHTML = `
        <div class="error-state">
          <h2>${escHtml(title)}</h2>
          <p>${escHtml(desc)}</p>
          <button class="btn btn-ghost" onclick="window.location.href='/'">← Back to feed</button>
        </div>`;
    }

    function renderPostPage(p) {
      const time = p.createdAt ? formatTime(p.createdAt) : '';
      const content = p.content || '';
      document.getElementById('page-content').innerHTML = `
        <button class="back-link" onclick="window.location.href='/'">← Back to feed</button>
        <div class="post-detail">
          <div class="post-detail-body">
            ${p.club ? `<span class="post-club-tag">${escHtml(p.club.name)}</span>` : ''}
            <div class="post-detail-title">${escHtml(p.title || 'Untitled')}</div>
            ${p.tags?.length ? `<div class="post-tags">${p.tags.map(t => `<span class="post-tag">${escHtml(t.name)}</span>`).join('')}</div>` : ''}
            ${content ? `<div class="post-detail-content">${escHtml(content)}</div>` : ''}
            ${renderMedia(p)}
            <div class="post-meta">
              <span class="post-author">${escHtml(p.authorName || p.author?.name || 'anonymous')}</span>
              <span class="meta-dot"></span>
              <span>#${p.id}</span>
              ${time ? `<span class="meta-dot"></span><span>${time}</span>` : ''}
            </div>
            <div class="post-actions">
              <div class="vote-column">
                <button class="action-btn" id="up-${p.id}" onclick="vote(${p.id},1)">↑ <span id="upcount-${p.id}">0</span></button>
                <button class="action-btn" id="down-${p.id}" onclick="vote(${p.id},-1)">↓ <span id="downcount-${p.id}">0</span></button>
              </div>
              ${(currentUser?.role === 'ADMIN' || p.authorName === currentUser?.name) ? `<button class="action-btn danger" onclick="deletePost(${p.id})">Delete</button>` : ''}
              ${currentUser ? `<button class="action-btn" onclick="reportPost(${p.id})">Report</button>` : ''}
            </div>
          </div>
        </div>
        <div class="comments-wrap">
          <div class="comments-header">Comments</div>
          ${currentUser ? `
          <div class="comment-input-area">
            <div class="comment-input-row">
              <input type="text" id="comment-input-${p.id}" placeholder="Add a comment…" onkeydown="if(event.key==='Enter') addComment(${p.id})">
              <button class="btn btn-dark btn-sm" id="comment-btn-${p.id}" onclick="addComment(${p.id})">Post</button>
            </div>
          </div>` : ''}
          <div class="comments-list" id="comment-list-${p.id}">
            <div class="no-comments">Loading comments…</div>
          </div>
        </div>`;
    }

    function renderMedia(post) {
      if (!post.mediaUrl) return '';
      if (post.mediaType === 'image') return `<div class="post-detail-media"><img src="${escHtml(post.mediaUrl)}" alt="Post image"></div>`;
      if (post.mediaType === 'video') return `<div class="post-detail-media"><video controls><source src="${escHtml(post.mediaUrl)}"></video></div>`;
      return '';
    }

    /* ── VOTES ── */
    async function loadVotes(id) {
      try {
        const [upRes, downRes, userRes] = await Promise.all([
          fetch(`/votes/up/${id}`), fetch(`/votes/down/${id}`),
          currentUser ? fetch(`/votes/user/${id}`) : Promise.resolve(null)
        ]);
        const upCount = upRes.ok ? await upRes.json() : 0;
        const downCount = downRes.ok ? await downRes.json() : 0;
        const userVote = (userRes && userRes.ok) ? await userRes.json() : 0;
        const upEl = document.getElementById(`upcount-${id}`);
        const downEl = document.getElementById(`downcount-${id}`);
        if (upEl) upEl.textContent = upCount;
        if (downEl) downEl.textContent = downCount;
        const upBtn = document.getElementById(`up-${id}`);
        const downBtn = document.getElementById(`down-${id}`);
        if (upBtn) upBtn.classList.toggle('active', userVote === 1);
        if (downBtn) downBtn.classList.toggle('active', userVote === -1);
      } catch {}
    }

    async function vote(postId, value) {
      if (!currentUser) { showToast('Sign in to vote', 'error'); return; }
      try {
        const res = await fetch(`/votes/${postId}?value=${value}`, { method: 'POST' });
        if (!res.ok) throw new Error();
        await loadVotes(postId);
      } catch { showToast('Could not vote', 'error'); }
    }

    /* ── COMMENTS ── */
    async function loadComments(postId) {
      const list = document.getElementById(`comment-list-${postId}`);
      if (!list) return;
      try {
        const res = await fetch(`/posts/${postId}/comments`);
        if (!res.ok) throw new Error();
        const comments = await res.json();
        if (!comments.length) {
          list.innerHTML = `<div class="no-comments">No comments yet — be the first to comment!</div>`;
          return;
        }
        list.innerHTML = buildCommentTree(comments).map(c => renderComment(c, postId)).join('');
      } catch {
        list.innerHTML = `<div class="no-comments">Could not load comments</div>`;
      }
    }

    function buildCommentTree(flat) {
      const map = {};
      flat.forEach(c => { map[c.id] = { ...c, children: [] }; });
      const roots = [];
      flat.forEach(c => {
        if (c.parentCommentId && map[c.parentCommentId]) {
          map[c.parentCommentId].children.push(map[c.id]);
        } else {
          roots.push(map[c.id]);
        }
      });
      return roots;
    }

    function renderComment(c, postId, depth = 0) {
      const isReply = depth > 0;
      const canDelete = currentUser && (currentUser.role === 'ADMIN' || c.user?.name === currentUser?.name);
      return `
        <div class="comment${isReply ? ' reply' : ''}">
          <div class="comment-meta">
            <span class="comment-user">${escHtml(c.user?.name || 'anonymous')}</span>
            <span class="meta-dot" style="width:3px;height:3px;border-radius:50%;background:var(--ink3);display:inline-block"></span>
            <span class="comment-time">${formatTime(c.createdAt)}</span>
          </div>
          <div class="comment-text">${escHtml(c.content)}</div>
          <div class="comment-actions">
            ${currentUser ? `<button class="c-btn" onclick="showReplyBox(${c.id},${postId})">Reply</button>` : ''}
            ${canDelete ? `<button class="c-btn del" onclick="deleteComment(${c.id},${postId})">Delete</button>` : ''}
          </div>
          <div id="reply-box-${c.id}"></div>
          ${c.children.map(ch => renderComment(ch, postId, depth + 1)).join('')}
        </div>`;
    }

    function showReplyBox(commentId, postId) {
      const box = document.getElementById(`reply-box-${commentId}`);
      if (!box) return;
      box.innerHTML = `
        <div class="reply-box">
          <input type="text" id="reply-input-${commentId}" placeholder="Write a reply…" onkeydown="if(event.key==='Enter') addReply(${commentId},${postId})">
          <button onclick="addReply(${commentId},${postId})" class="btn btn-dark btn-sm">Reply</button>
        </div>`;
      document.getElementById(`reply-input-${commentId}`)?.focus();
    }

    async function addComment(postId) {
      if (!currentUser) { showToast('Sign in to comment', 'error'); return; }
      const input = document.getElementById(`comment-input-${postId}`);
      const btn = document.getElementById(`comment-btn-${postId}`);
      const content = input?.value.trim();
      if (!content) return;
      btn?.setAttribute('disabled', true);
      try {
        const res = await fetch(`/posts/${postId}/comment`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content, parentCommentId: null })
        });
        if (!res.ok) { const msg = await res.text(); throw new Error(msg); }
        input.value = '';
        await loadComments(postId);
      } catch(e) { showToast(e.message || 'Could not post comment', 'error'); }
      finally { btn?.removeAttribute('disabled'); }
    }

    async function addReply(parentId, postId) {
      if (!currentUser) return;
      const input = document.getElementById(`reply-input-${parentId}`);
      const content = input?.value.trim();
      if (!content) return;
      try {
        const res = await fetch(`/posts/${postId}/comment`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content, parentCommentId: parentId })
        });
        if (!res.ok) { const msg = await res.text(); throw new Error(msg); }
        await loadComments(postId);
      } catch(e) { showToast(e.message || 'Could not post reply', 'error'); }
    }

    async function deleteComment(commentId, postId) {
      if (!confirm('Delete this comment?')) return;
      try {
        const res = await fetch(`/posts/comments/${commentId}`, { method: 'DELETE' });
        if (!res.ok) throw new Error();
        showToast('Comment deleted');
        await loadComments(postId);
      } catch { showToast('Could not delete comment', 'error'); }
    }

    async function deletePost(postId) {
      if (!confirm('Delete this post?')) return;
      try {
        const res = await fetch(`/posts/${postId}`, { method: 'DELETE' });
        if (!res.ok) throw new Error();
        showToast('Post deleted');
        setTimeout(() => window.location.href = '/', 1000);
      } catch { showToast('Could not delete post', 'error'); }
    }

    async function reportPost(postId) {
      const reason = prompt('Reason for report?');
      if (!reason) return;
      await fetch('/reports', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ postId, reason }) });
      showToast('Report submitted');
    }

    /* ── TOPBAR DRAWER ── */
    function toggleTopbarDrawer() { document.getElementById('topbar-drawer').classList.toggle('open'); }
    document.addEventListener('click', (e) => {
      const drawer = document.getElementById('topbar-drawer');
      const hamburger = document.getElementById('topbar-hamburger');
      if (drawer && !drawer.contains(e.target) && hamburger && !hamburger.contains(e.target)) {
        drawer.classList.remove('open');
      }
      if (_notifOpen && window.innerWidth > 860) {
        const wrap = document.getElementById('notif-bell-wrap');
        const dropdown = document.getElementById('notif-dropdown');
        if (wrap && !wrap.contains(e.target) && dropdown && !dropdown.contains(e.target)) {
          closeNotifDropdown();
        }
      }
    });

    /* ── NOTIFICATIONS ── */
    let _notifOpen = false;
    let _unreadCount = 0;

    function initNotifications() {
      if (!currentUser) return;
      pollUnreadCount();
      setInterval(pollUnreadCount, 30000);
    }

    async function pollUnreadCount() {
      try {
        const res = await fetch('/notifications/unread-count');
        if (!res.ok) return;
        const data = await res.json();
        _unreadCount = data.count || 0;
        updateBellBadge(_unreadCount);
      } catch {}
    }

    function updateBellBadge(count) {
      const bell = document.getElementById('notif-bell');
      if (!bell) return;
      let badge = bell.querySelector('.notif-badge');
      if (count > 0) {
        if (!badge) { badge = document.createElement('span'); badge.className = 'notif-badge'; bell.appendChild(badge); }
        badge.textContent = count > 9 ? '9+' : count;
      } else {
        badge?.remove();
      }
      const drawerBadge = document.getElementById('drawer-notif-badge');
      if (drawerBadge) {
        drawerBadge.textContent = count > 9 ? '9+' : count;
        drawerBadge.style.display = count > 0 ? 'inline-block' : 'none';
      }
    }

    function pushBannerHTML() {
      if (!('Notification' in window)) return '';
      if (Notification.permission === 'granted') return '';
      return `<div class="notif-push-banner"><span>Enable push notifications?</span><button class="notif-push-enable" onclick="requestPushPermission()">Enable</button></div>`;
    }

    async function toggleNotifDropdown() {
      if (_notifOpen) { closeNotifDropdown(); return; }
      openNotifDropdown();
    }

    async function openNotifDropdown() {
      _notifOpen = true;
      const wrap = document.getElementById('notif-bell-wrap') || document.body;
      const existing = document.getElementById('notif-dropdown');
      if (existing) existing.remove();
      const dropdown = document.createElement('div');
      dropdown.className = 'notif-dropdown';
      dropdown.id = 'notif-dropdown';
      dropdown.innerHTML = `
        <div class="notif-header">
          <span class="notif-header-title">Notifications</span>
          <div class="notif-header-actions">
            <button class="notif-mark-read" onclick="markAllRead()">Mark all read</button>
            <button class="notif-close-btn" onclick="closeNotifDropdown()">✕</button>
          </div>
        </div>
        ${pushBannerHTML()}
        <div class="notif-list" id="notif-list"><div class="notif-empty">Loading…</div></div>`;
      wrap.appendChild(dropdown);
      document.getElementById('notif-overlay')?.classList.add('visible');
      fetch('/notifications/read-all', { method: 'POST' }).catch(() => {});
      _unreadCount = 0;
      updateBellBadge(0);
      try {
        const res = await fetch('/notifications');
        if (!res.ok) throw new Error();
        const notifs = await res.json();
        const list = document.getElementById('notif-list');
        if (!list) return;
        if (!notifs.length) { list.innerHTML = `<div class="notif-empty">You're all caught up ✓</div>`; return; }
        list.innerHTML = notifs.map(n => `
          <div class="notif-item ${n.read ? '' : 'unread'}" onclick="handleNotifClick('${escHtml(n.url || '/')}')">
            <div class="notif-item-title">${escHtml(n.title)}</div>
            <div class="notif-item-body">${escHtml(n.body)}</div>
            <div class="notif-item-time">${formatTime(n.createdAt)}</div>
          </div>`).join('');
      } catch {
        const list = document.getElementById('notif-list');
        if (list) list.innerHTML = `<div class="notif-empty">Could not load notifications</div>`;
      }
    }

    function handleNotifClick(url) {
      closeNotifDropdown();
      window.location.href = url;
    }

    function closeNotifDropdown() {
      _notifOpen = false;
      document.getElementById('notif-dropdown')?.remove();
      document.getElementById('notif-overlay')?.classList.remove('visible');
    }

    async function markAllRead() {
      await fetch('/notifications/read-all', { method: 'POST' }).catch(() => {});
      updateBellBadge(0);
      document.querySelectorAll('.notif-item').forEach(el => el.classList.remove('unread'));
    }

    async function requestPushPermission() {
      try {
        const perm = await Notification.requestPermission();
        if (perm !== 'granted') return;
        const reg = await navigator.serviceWorker.ready;
        const sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlB64ToUint8Array(await getVapidKey()) });
        await fetch('/push/subscribe', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(sub) });
      } catch {}
    }
    async function getVapidKey() {
      const r = await fetch('/push/vapid-public-key');
      return r.ok ? r.text() : '';
    }
    function urlB64ToUint8Array(b64) {
      const pad = '='.repeat((4 - b64.length % 4) % 4);
      const raw = atob((b64 + pad).replace(/-/g, '+').replace(/_/g, '/'));
      return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
    }
</script>
